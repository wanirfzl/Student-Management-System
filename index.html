<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registry</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid p-4">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h1 class="fw-bold">Student Registry</h1>

            <p class="text-muted">
                Manage and organize student information.
            </p>
        </div>

        <div class="student-card">

            <h2 id="totalStudents">0</h2>

            <p>Total Students</p>

        </div>

    </div>

    <div class="row g-4">

        <!-- Form Section -->

        <div class="col-lg-3">

            <div class="form-card">

                <h5 class="mb-4">
                    Register Student
                </h5>

                <form id="studentForm">

                    <div class="mb-3">

                        <label class="form-label">
                            Student ID
                        </label>

                        <input
                            type="text"
                            id="studentId"
                            class="form-control"
                            placeholder="Enter Student ID"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Student Name
                        </label>

                        <input
                            type="text"
                            id="studentName"
                            class="form-control"
                            placeholder="Enter Student Name"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Programme
                        </label>

                        <select
                            id="programme"
                            class="form-select"
                            required>

                            <option value="">
                                Select Programme
                            </option>

                            <option>AA103 Diploma of Accountancy</option>
                            <option>CC101 Diploma in Computer Science</option>
                            <option>BK101 Diploma in Corporate Communication</option>
                            <option>AA201 Bachelor of Accountancy (Honours)
                            <option>FC001 Foundation in Commerce</option>
                            </option>

                        </select>

                    </div>

                    <button
                        id="submitBtn"
                        type="submit"
                        class="btn btn-primary w-100">

                        Add Student

                    </button>

                </form>

            </div>

        </div>

        <!-- Table Section -->

        <div class="col-lg-9">

            <div class="table-card">

                <input
                    type="text"
                    id="searchInput"
                    class="form-control mb-3"
                    placeholder="Search Student...">

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-header">

                            <tr>

                                <th>ID</th>
                                <th>NAME</th>
                                <th>PR0GRAMME</th>
                                <th>ACTION</th>

                            </tr>

                        </thead>

                        <tbody id="studentTable">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
